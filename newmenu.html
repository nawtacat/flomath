<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florian Editor - Projects</title>
    <style>
        body {
            background-color: #1e1e1e;
            color: #cccccc;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px;
        }
        h1 { margin-bottom: 30px; }
        .project-list {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .project-item {
            background: #252526;
            border: 1px solid #3e3e42;
            padding: 15px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }
        .project-item:hover { background: #333; }
        .project-name { font-weight: bold; font-size: 16px; }
        .project-date { font-size: 12px; color: #888; }
        button {
            background-color: #007acc;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button:hover { opacity: 0.9; }
        .btn-download {
            background-color: #444;
            font-size: 12px;
            padding: 5px 10px;
        }
        .import-section {
            margin-bottom: 20px;
            color: #888;
            font-size: 14px;
        }
    </style>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
</head>
<body>

    <h1>My Projects</h1>
    <div style="display: flex; gap: 10px;">
        <button onclick="createNewProject()">+ New Project</button>
        <button onclick="document.getElementById('import-file').click()" style="background-color: #28a745;">📥 Import Report</button>
        <input type="file" id="import-file" style="display:none" onchange="importProjectReport(this)">
    </div>
    <div id="project-list" class="project-list">Loading...</div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyAbnPpcIt88B0jIAoLUdC71zmQDvR_fdu8", authDomain: "physmathacademy-722b3.firebaseapp.com", databaseURL: "https://physmathacademy-722b3-default-rtdb.firebaseio.com", projectId: "physmathacademy-722b3", storageBucket: "physmathacademy-722b3.appspot.com", messagingSenderId: "1093640992262", appId: "1:1093640992262:web:35b1bf4d2364bcf745f587" };
        firebase.initializeApp(firebaseConfig);
        
        // Force WebSockets to bypass COEP restrictions
        try {
            const dbInstance = firebase.database();
            // Try multiple paths to find the internal repo safely
            // We access .ref() to ensure the repo is instantiated
            const ref = dbInstance.ref(); 
            const repo = ref.repo || ref.root.repo || dbInstance.repo_;
            if (repo) { repo.forceWebsockets = true; }
        } catch (e) { console.warn('Could not force WebSockets', e); }

        // Anonymous auth to ensure access
        firebase.auth().signInAnonymously().catch(console.error);

        const db = firebase.database();
        const listEl = document.getElementById('project-list');

        function loadProjects() {
            db.ref('projects').on('value', (snapshot) => {
                listEl.innerHTML = '';
                const data = snapshot.val();
                if (!data) {
                    listEl.innerHTML = '<div style="text-align:center; color:#666;">No projects found. Create one!</div>';
                    return;
                }
                
                Object.keys(data).forEach(key => {
                    const proj = data[key];
                    const div = document.createElement('div');
                    div.className = 'project-item';
                    
                    const dateStr = proj.lastModified ? new Date(proj.lastModified).toLocaleString() : 'Unknown date';
                    
                    div.innerHTML = `
                        <div onclick="window.location.href='editor.html?project=${key}'" style="flex:1">
                            <span class="project-name">${proj.name || 'Untitled'}</span><br>
                            <span class="project-date">${dateStr}</span>
                        </div>
                        <button class="btn-download" onclick="downloadProjectReport('${key}', '${proj.name || 'Untitled'}')">📄 Download Report</button>
                    `;
                    listEl.appendChild(div);
                });
            });
        }

        function createNewProject() {
            const name = prompt("Enter project name:", "New Video");
            if (!name) return;
            
            const isLandscape = confirm("Create in Landscape mode (1920x1080)?\nClick OK for Landscape, Cancel for Portrait (1080x1920).");
            const width = isLandscape ? 1920 : 1080;
            const height = isLandscape ? 1080 : 1920;

            const newRef = db.ref('projects').push();
            newRef.set({
                name: name,
                width: width,
                height: height,
                created: firebase.database.ServerValue.TIMESTAMP,
                lastModified: firebase.database.ServerValue.TIMESTAMP
            });
            
            // Initialize state with dimensions
            db.ref('states/' + newRef.key).set({ width, height });
            
            window.location.href = `editor.html?project=${newRef.key}`;
        }

        async function downloadProjectReport(projectId, projectName) {
            const status = confirm(`Generate and download a detailed text report for "${projectName}"?`);
            if (!status) return;

            try {
                const snapshot = await db.ref('states/' + projectId).once('value');
                const stateData = snapshot.val();

                if (!stateData) {
                    alert("Could not find data for this project.");
                    return;
                }

                // Create the "Beautiful Report" / JSON Data
                // We keep it as valid JSON so the reader can reconstruct it perfectly
                const report = {
                    version: "1.0",
                    exportedAt: new Date().toISOString(),
                    projectName: projectName,
                    projectState: stateData
                };

                const blob = new Blob([JSON.stringify(report, null, 4)], { type: 'text/plain' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `${projectName.replace(/\s+/g, '_')}_Report.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            } catch (e) {
                console.error(e);
                alert("Failed to generate report: " + e.message);
            }
        }

        function importProjectReport(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    if (!data.projectState) throw new Error("Invalid report format.");

                    const newProjRef = db.ref('projects').push();
                    await newProjRef.set({
                        name: data.projectName + " (Imported)",
                        width: data.projectState.width || 1080,
                        height: data.projectState.height || 1920,
                        created: firebase.database.ServerValue.TIMESTAMP,
                        lastModified: firebase.database.ServerValue.TIMESTAMP
                    });

                    await db.ref('states/' + newProjRef.key).set(data.projectState);
                    alert("Project successfully rebuilt from report!");
                    input.value = '';
                } catch (err) {
                    console.error(err);
                    alert("Failed to rebuild project: " + err.message);
                }
            };
            reader.readAsText(file);
        }

        loadProjects();
    </script>
</body>
</html>
