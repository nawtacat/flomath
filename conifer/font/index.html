<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlyphForge Studio — Exact Command Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Fira Code', monospace; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #090d16; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 3px; }
    </style>
</head>
<body class="bg-[#030712] text-slate-100 min-h-screen flex flex-col overflow-hidden select-none">

    <!-- Navbar Container -->
    <header class="bg-[#090d16] border-b border-slate-900 px-6 py-4 flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-indigo-600 text-white p-2 rounded-lg font-mono font-bold text-sm">&gt;_</div>
            <div>
                <h1 class="text-sm font-bold text-slate-200">GlyphForge Script Studio</h1>
                <p class="text-[10px] text-slate-500 font-mono">Max Core Boundaries: 1000x1000 Plane</p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <input id="fontName" type="text" value="CustomScriptFont" class="bg-[#02040a] border border-slate-800 px-3 py-1.5 rounded text-xs text-indigo-400 focus:outline-none w-44">
            <button onclick="exportFont()" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold text-xs px-4 py-2 rounded shadow transition-all">
                Export Font (.ttf)
            </button>
        </div>
    </header>

    <!-- Main Workspace Split Interface -->
    <div class="flex flex-1 overflow-hidden">
        
        <!-- Left Code Workspace Console Panel -->
        <main class="w-[45%] bg-[#060a12] border-r border-slate-900 flex flex-col h-full">
            <div class="bg-[#090d16]/80 px-4 py-2.5 border-b border-slate-900 flex items-center justify-between">
                <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Compiler Editor</span>
                <span id="syntaxStatus" class="text-[11px] text-emerald-400 font-mono">Active</span>
            </div>
            
            <textarea id="codeConsole" class="flex-1 bg-[#04070d] text-indigo-300 p-5 text-xs font-mono focus:outline-none leading-6 tracking-wide overflow-y-auto" 
                      placeholder="// Input commands using exact requested syntax specifications..." spellcheck="false"></textarea>
            
            <!-- Lower Diagnostic Terminal Panel -->
            <div class="h-40 bg-[#020408] border-t border-slate-900 flex flex-col">
                <div class="bg-[#050910] px-4 py-1.5 text-[10px] uppercase font-mono tracking-widest text-slate-500 border-b border-slate-900">
                    Console Crop Matrix Outputs
                </div>
                <div id="terminalLog" class="p-3 text-[11px] text-slate-400 font-mono space-y-1 overflow-y-auto flex-1">
                    <!-- Live tracking readouts dump here -->
                </div>
            </div>
        </main>

        <!-- Right Visualizer Viewport Stage -->
        <section class="flex-1 bg-[#020408] flex flex-col h-full overflow-hidden">
            <div class="bg-[#060a12] px-6 py-2 border-b border-slate-900 flex items-center justify-between text-xs">
                <div>Character Layer: <span id="statusChar" class="text-indigo-400 font-bold text-sm">Ա</span></div>
                <div class="text-slate-400 font-mono">Calculated Crop Width: <span id="cropWidthVal" class="text-emerald-400 font-bold">0</span> units</div>
            </div>

            <!-- Main Display Matrix Grid Canvas -->
            <div class="flex-1 flex items-center justify-center p-6 bg-[#04060a]">
                <div class="p-4 bg-[#060a12] border border-slate-800 rounded-xl shadow-2xl">
                    <canvas id="vectorPlane" width="600" height="600" class="bg-[#020306] rounded"></canvas>
                </div>
            </div>

            <!-- Lower Armenian Selector Strip Overlay -->
            <footer class="h-24 bg-[#060a12] border-t border-slate-900 p-3 flex flex-col shrink-0">
                <div id="glyphGrid" class="flex-1 overflow-x-auto flex items-center space-x-1.5 pb-1">
                    <!-- Generated on-the-fly -->
                </div>
            </footer>
        </section>
    </div>

    <script>
        const canvas = document.getElementById('vectorPlane');
        const ctx = canvas.getContext('2d');
        const codeConsole = document.getElementById('codeConsole');
        const terminalLog = document.getElementById('terminalLog');
        const cropWidthVal = document.getElementById('cropWidthVal');

        const PLANE_MAX = 1000;
        const CANVAS_PADDING = 60;

        const armenianGlyphs = [];
        for(let u = 0x0531; u <= 0x0556; u++) { armenianGlyphs.push({ char: String.fromCharCode(u), unicode: u }); }
        for(let u = 0x0561; u <= 0x0586; u++) { armenianGlyphs.push({ char: String.fromCharCode(u), unicode: u }); }

        let fontScriptCache = {};
        let currentUnicode = armenianGlyphs[0].unicode;

        function seedDatabase() {
            const cache = localStorage.getItem('glyphforge_exact_v3');
            if (cache) {
                fontScriptCache = JSON.parse(cache);
            } else {
                armenianGlyphs.forEach((g, idx) => {
                    if (idx < 26) {
                        fontScriptCache[g.unicode] = `// Exact Syntax Blueprint\nCOLOR (100, 100 : 200, 100 : 200, 700 : 100, 700)\nCOLOR (200, 600 : 500, 600 : 500, 700 : 200, 700)\nCURVE (200, 400 : 550, 250 : 200, 100)\nBUCKET (150, 300)`;
                    } else {
                        fontScriptCache[g.unicode] = `// Lowercase Blueprint\nCOLOR (150, 100 : 250, 100 : 250, 500 : 150, 500)\nCOLOR (250, 400 : 450, 400 : 450, 500 : 250, 500)\nCOLOR (450, 100 : 550, 100 : 550, 500 : 450, 500)`;
                    }
                });
            }
        }

        // Coordinate projection matrix utilities (Max space locked to 1000x1000)
        function toScreenX(fontX) {
            return CANVAS_PADDING + (fontX / PLANE_MAX) * (canvas.width - 2 * CANVAS_PADDING);
        }

        function toScreenY(fontY) {
            // Mapping Cartesian plane inversely to screens: 0 is baseline floor, 1000 is apex limit top
            return (canvas.height - CANVAS_PADDING) - (fontY / PLANE_MAX) * (canvas.height - 2 * CANVAS_PADDING);
        }

        // Helper: Parses point sequences separated explicitly by colons, handles coordinate commas safely
        function parseExactPoints(str) {
            const matches = str.match(/\(([^)]+)\)/);
            if (!matches) return [];
            return matches[1].split(':').map(ptStr => {
                const xy = ptStr.split(',').map(v => parseFloat(v.trim()));
                return { x: xy[0], y: xy[1] };
            });
        }

        function runExactCompiler() {
            const code = codeConsole.value;
            fontScriptCache[currentUnicode] = code;
            localStorage.setItem('glyphforge_exact_v3', JSON.stringify(fontScriptCache));

            ctx.fillStyle = '#020306';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            renderWorkspaceGrid();

            const lines = code.split('\n');
            let logs = [];
            let maxRecordedX = 0;

            ctx.fillStyle = 'rgba(99, 102, 241, 0.65)';
            ctx.strokeStyle = '#818cf8';
            ctx.lineWidth = 2.5;

            lines.forEach((lineStr, idx) => {
                let line = lineStr.trim();
                if (!line || line.startsWith('//')) return;

                const commandToken = line.split(/[ \(]/)[0].toUpperCase();

                if (commandToken === 'COLOR') {
                    const pts = parseExactPoints(line);
                    if (pts.length >= 3) {
                        ctx.beginPath();
                        ctx.moveTo(toScreenX(pts[0].x), toScreenY(pts[0].y));
                        pts.forEach(p => {
                            ctx.lineTo(toScreenX(p.x), toScreenY(p.y));
                            if (p.x > maxRecordedX) maxRecordedX = p.x;
                        });
                        ctx.closePath();
                        ctx.fill(); ctx.stroke();
                        logs.push(`Line ${idx+1}: Processed COLOR connective polygon containing [Points: ${pts.length}]`);
                    }
                } 
                else if (commandToken === 'CURVE') {
                    const pts = parseExactPoints(line);
                    if (pts.length === 3) {
                        ctx.beginPath();
                        ctx.moveTo(toScreenX(pts[0].x), toScreenY(pts[0].y));
                        ctx.quadraticCurveTo(toScreenX(pts[1].x), toScreenY(pts[1].y), toScreenX(pts[2].x), toScreenY(pts[2].y));
                        ctx.stroke();
                        pts.forEach(p => { if(p.x > maxRecordedX) maxRecordedX = p.x; });
                        logs.push(`Line ${idx+1}: Computed 3-Point Quadratic Spline curve window segment bounds`);
                    }
                }
            });

            // Second pass dedicated strictly to raster processing operations layout executions
            lines.forEach(lineStr => {
                let line = lineStr.trim();
                if (!line.toUpperCase().startsWith('BUCKET')) return;
                const matches = line.match(/\(([^)]+)\)/);
                if (matches) {
                    const coords = matches[1].split(',').map(v => parseFloat(v.trim()));
                    if (coords.length === 2) {
                        executeRasterFloodFill(Math.round(toScreenX(coords[0])), Math.round(toScreenY(coords[1])), [99, 102, 241, 255]);
                    }
                }
            });

            // Handle the automated auto-crop calculations logic boundary updates
            const autoCroppedWidth = maxRecordedX > 0 ? Math.min(1000, Math.round(maxRecordedX + 60)) : 600;
            cropWidthVal.innerText = autoCroppedWidth;

            // Draw visual indicator representing active auto-cropped width limits bounding line parameters
            ctx.strokeStyle = 'rgba(16, 185, 129, 0.5)';
            ctx.setLineDash([4, 4]);
            ctx.beginPath(); ctx.moveTo(toScreenX(autoCroppedWidth), 0); ctx.lineTo(toScreenX(autoCroppedWidth), canvas.height); ctx.stroke();
            ctx.setLineDash([]);

            terminalLog.innerHTML = logs.length > 0 ? logs.join('<br>') : "Ready. Standard grid bounds operating strictly at max 1000 layout coordinates limit.";
        }

        function renderWorkspaceGrid() {
            ctx.strokeStyle = '#111827';
            ctx.lineWidth = 1;
            for (let i = 0; i <= PLANE_MAX; i += 100) {
                ctx.beginPath(); ctx.moveTo(toScreenX(i), toScreenY(0)); ctx.lineTo(toScreenX(i), toScreenY(1000)); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(toScreenX(0), toScreenY(i)); ctx.lineTo(toScreenX(1000), toScreenY(i)); ctx.stroke();
            }

            // Direct metric indicator baselines mapping alignments boundaries configurations
            ctx.strokeStyle = 'rgba(99, 102, 241, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.moveTo(0, toScreenY(0)); ctx.lineTo(canvas.width, toScreenY(0)); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(0, toScreenY(800)); ctx.lineTo(canvas.width, toScreenY(800)); ctx.stroke();
        }

        function executeRasterFloodFill(startX, startY, fillColor) {
            const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imgData.data;
            const width = imgData.width;
            const height = imgData.height;

            const targetIdx = (startY * width + startX) * 4;
            const targetR = data[targetIdx], targetG = data[targetIdx+1], targetB = data[targetIdx+2];

            if (Math.abs(targetR - fillColor[0]) < 10 && Math.abs(targetG - fillColor[1]) < 10) return;

            const queue = [[startX, startY]];
            while (queue.length > 0) {
                const [cx, cy] = queue.pop();
                let idx = (cy * width + cx) * 4;

                if (cx >= 0 && cx < width && cy >= 0 && cy < height && Math.abs(data[idx] - targetR) < 35 && Math.abs(data[idx+1] - targetG) < 35) {
                    data[idx] = fillColor[0]; data[idx+1] = fillColor[1]; data[idx+2] = fillColor[2]; data[idx+3] = fillColor[3];
                    queue.push([cx + 1, cy], [cx - 1, cy], [cx, cy + 1], [cx, cy - 1]);
                }
            }
            ctx.putImageData(imgData, 0, 0);
        }

        function selectGlyph(unicode) {
            currentUnicode = unicode;
            let targetObj = armenianGlyphs.find(x => x.unicode === unicode);
            document.getElementById('statusChar').innerText = targetObj.char;
            renderKeyboardStrip();
            runExactCompiler();
        }

        function renderKeyboardStrip() {
            const container = document.getElementById('glyphGrid');
            container.innerHTML = '';
            armenianGlyphs.forEach(g => {
                const isSelected = g.unicode === currentUnicode;
                const btn = document.createElement('button');
                btn.className = `shrink-0 w-10 h-12 flex flex-col items-center justify-center rounded transition font-sans text-xs ${isSelected ? 'bg-indigo-600 text-white font-bold border border-indigo-400/30' : 'bg-[#0b111e] text-slate-400 hover:bg-slate-800'}`;
                btn.onclick = () => selectGlyph(g.unicode);
                btn.innerHTML = `<span>${g.char}</span>`;
                container.appendChild(btn);
            });
        }

        // OpenType Vector Generation Compiler Output Pipeline Implementation
        function exportFont() {
            const fontName = document.getElementById('fontName').value.replace(/\s+/g, '') || 'ScriptFont';
            
            const notdefPath = new opentype.Path();
            notdefPath.moveTo(50, 0); notdefPath.lineTo(50, 700); notdefPath.lineTo(450, 700); notdefPath.lineTo(450, 0); notdefPath.closePath();
            const compiledGlyphs = [new opentype.Glyph({ name: '.notdef', unicode: 0, advanceWidth: 500, path: notdefPath })];

            armenianGlyphs.forEach(g => {
                const lines = (fontScriptCache[g.unicode] || '').split('\n');
                const path = new opentype.Path();
                let maxBoundsX = 0;

                lines.forEach(lineStr => {
                    let line = lineStr.trim();
                    if (!line || line.startsWith('//')) return;

                    const token = line.split(/[ \(]/)[0].toUpperCase();
                    if (token === 'COLOR') {
                        const pts = parseExactPoints(line);
                        if(pts.length >= 3) {
                            path.moveTo(pts[0].x, pts[0].y);
                            pts.forEach(p => { path.lineTo(p.x, p.y); if(p.x > maxBoundsX) maxBoundsX = p.x; });
                            path.closePath();
                        }
                    } 
                    else if (token === 'CURVE') {
                        const pts = parseExactPoints(line);
                        if(pts.length === 3) {
                            path.moveTo(pts[0].x, pts[0].y);
                            path.quadraticCurveTo(pts[1].x, pts[1].y, pts[2].x, pts[2].y);
                            pts.forEach(p => { if(p.x > maxBoundsX) maxBoundsX = p.x; });
                        }
                    }
                });

                const dynamicAdvanceWidth = maxBoundsX > 0 ? Math.min(1000, Math.round(maxBoundsX + 60)) : 600;

                compiledGlyphs.push(new opentype.Glyph({
                    name: 'arm_' + g.unicode,
                    unicode: g.unicode,
                    advanceWidth: dynamicAdvanceWidth,
                    path: path
                }));
            });

            const font = new opentype.Font({
                familyName: fontName, styleName: 'Regular', unitsPerEm: 1000, ascender: 800, descender: -200, glyphs: compiledGlyphs
            });
            font.download();
        }

        codeConsole.addEventListener('input', runExactCompiler);
        seedDatabase();
        selectGlyph(armenianGlyphs[0].unicode);
    </script>
</body>
</html>
