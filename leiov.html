<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florian Math - Digital SAT Practice</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js" 
            onload="renderMath(document.body);"></script>

    <style>
        @font-face {
            font-family: 'Minion Pro';
            src: local('Minion Pro'), local('MinionPro-Regular'), serif;
        }

        :root {
            --sat-blue: #0071bc;
            --sat-light-blue: #e8f3fb;
            --sat-border: #d1d1d1;
            --main-font: "Minion Pro", "Georgia", serif;
            --ui-font: "Segoe UI", Roboto, Arial, sans-serif;
            --sat-red: #e02128;
            --sat-green: #4caf50;
            --sat-yellow: #fcd116;
        }

        body {
            font-family: var(--ui-font);
            margin: 0; padding: 0;
            display: flex; flex-direction: column;
            height: 100vh; background: white;
            color: #1b1c1d;
            user-select: none;
        }

        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 40px; border-bottom: 1px solid var(--sat-border);
            height: 60px; flex-shrink: 0;
        }

        .timer-bubble {
            border: 1px solid var(--sat-border); border-radius: 20px;
            padding: 4px 28px; font-weight: 700; font-size: 1.2rem;
            background: white;
        }

        /* The Multicolor RGBY Dotted Separator */
        .dotted-line {
            width: 100%; height: 5px;
            background-image: linear-gradient(to right, 
                var(--sat-red) 12.5%, var(--sat-red) 25%, 
                var(--sat-green) 25%, var(--sat-green) 37.5%, 
                var(--sat-blue) 37.5%, var(--sat-blue) 50%, 
                var(--sat-yellow) 50%, var(--sat-yellow) 62.5%,
                #ccc 62.5%);
            background-size: 80px 100%;
            background-repeat: repeat-x;
        }

        main { display: flex; flex: 1; overflow: hidden; padding: 20px 40px; gap: 40px; }
        .content-area { flex: 1; overflow-y: auto; font-family: var(--main-font); font-size: 1.3rem; line-height: 1.6; }
        .interaction-area { flex: 1; overflow-y: auto; border-left: 1px solid #f0f0f0; padding-left: 20px; }

        .mark-review { display: flex; align-items: center; cursor: pointer; font-weight: 600; font-size: 0.9rem; margin-bottom: 20px; font-family: var(--ui-font); }
        .mark-review span { font-size: 1.4rem; margin-right: 10px; color: #ddd; }
        .marked span { color: #d00; }
        
        .option {
            display: flex; align-items: center; border: 1px solid var(--sat-border);
            border-radius: 12px; padding: 15px; margin-bottom: 12px; cursor: pointer;
            font-family: var(--main-font);
        }
        .option.selected { border: 2px solid var(--sat-blue); background: var(--sat-light-blue); }
        
        .option-bubble {
            width: 34px; height: 34px; border: 1px solid #888; border-radius: 50%;
            display: flex; justify-content: center; align-items: center; margin-right: 15px; 
            font-weight: bold; font-family: var(--ui-font); font-size: 0.95rem;
        }
        .selected .option-bubble { background: var(--sat-blue); color: white; border-color: var(--sat-blue); }

        /* Review Page on the same page */
        #results-container { display: none; padding: 40px; overflow-y: auto; height: 100%; flex-direction: column; align-items: center; }
        .feedback-item { 
            width: 100%; max-width: 900px; border-bottom: 1px solid #ddd; padding: 35px 0; 
            font-family: var(--main-font); font-size: 1.2rem;
        }
        .status-header { font-family: var(--ui-font); font-weight: 800; font-size: 0.85rem; text-transform: uppercase; margin-bottom: 10px; }
        .is-correct { color: #1e8e3e; }
        .is-incorrect { color: #d93025; }
        .rationale { background: #f9f9f9; padding: 20px; border-left: 5px solid var(--sat-blue); margin-top: 20px; font-style: italic; }

        footer { height: 75px; border-top: 1px solid var(--sat-border); display: flex; justify-content: space-between; align-items: center; padding: 0 40px; background: white; }
        .nav-btn { background: var(--sat-blue); color: white; border: none; padding: 12px 35px; border-radius: 30px; font-weight: 700; cursor: pointer; font-size: 1rem; }
        .progress-indicator { background: #212121; color: white; padding: 8px 25px; border-radius: 8px; font-weight: 700; cursor: pointer; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<header id="top-nav">
    <div style="font-weight: 800;">Math Practice Module</div>
    <div class="timer-container">
        <div class="timer-bubble" id="timer">18:00</div>
    </div>
    <div style="width: 120px;"></div>
</header>

<div class="dotted-line"></div>

<main id="quiz-view">
    <div class="content-area">
        <div class="mark-review" id="mark-trigger" onclick="toggleMark()">
            <span id="mark-flag">⚑</span> Mark for Review
        </div>
        <div id="question-text"></div>
    </div>
    <div class="interaction-area">
        <div style="margin-bottom: 20px; color: #777; font-size: 0.8rem; font-weight: bold; font-family: var(--ui-font);">
            ID: <span id="q-id-code"></span>
        </div>
        <div id="options-list"></div>
    </div>
</main>

<div id="results-container">
    <div style="text-align: center; margin-bottom: 50px;">
        <h1 style="font-size: 3rem; margin: 0;">Practice Summary</h1>
        <h2 style="color: var(--sat-blue); font-size: 2rem;">Score: <span id="final-score">0</span> / 6</h2>
        <button onclick="location.reload()" style="margin-top: 20px; padding: 12px 40px; border: 2px solid var(--sat-blue); background: none; color: var(--sat-blue); border-radius: 25px; font-weight: 800; cursor: pointer; font-family: var(--ui-font);">Reset Module</button>
    </div>
    <div id="feedback-feed" style="width: 100%;"></div>
    <div style="margin: 60px 0;">
        <a href="https://flomath.space" style="color: var(--sat-blue); font-weight: 900; text-decoration: none; font-size: 1.2rem;">Back to flomath.space</a>
    </div>
</div>

<footer id="bottom-bar">
    <div class="footer-left">
        <a href="https://flomath.space" style="color: black; font-weight: 800; text-decoration: none;">flomath.space</a>
    </div>
    <div class="progress-indicator" id="progress-text">Question 1 of 6 ▾</div>
    <div class="footer-right">
        <button class="nav-btn" onclick="goNext()">Next</button>
    </div>
</footer>

<script>
    const questionBank = [
        {
            id: "9b886541",
            q: "If $3x - 8 = 7$, what is the value of $3x + 8$?",
            choices: ["$-1$", "$5$", "$13$", "$23$"],
            answerIdx: 3,
            explanation: "Choice D is correct. It's given that $3x - 8 = 7$. Adding 8 to both sides yields $3x = 15$. Adding 8 to both sides again yields $3x + 8 = 23$."
        },
        {
            id: "6ac23de7",
            q: "$\\frac{4x}{5} = 20$<br><br>In the equation above, what is the value of $x$?",
            choices: ["$25$", "$24$", "$16$", "$15$"],
            answerIdx: 0,
            explanation: "Choice A is correct. Multiplying both sides by 5 results in $4x = 100$. Dividing by 4 results in $x = 25$."
        },
        {
            id: "9d4270fe",
            q: "A company calculating profit by subtracting fixed costs from revenue uses the equation $15,000 = 2.00x - 4,500$. Which statement is the best interpretation of 2.00 in this context?",
            choices: [
                "The monthly sales revenue, in dollars, from selling tape dispensers",
                "The monthly sales revenue, in dollars, from each tape dispenser sold",
                "The monthly cost, in dollars, of creating each tape dispenser",
                "The monthly cost, in dollars, of creating tape dispensers"
            ],
            answerIdx: 0,
            explanation: "Choice A is correct. 2.00x represents total monthly sales revenue; thus 2.00 is the interpretation of that revenue component."
        },
        {
            id: "7a5a74a6",
            q: "$3(2x - 6) - 11 = 4(x - 3) + 6$<br><br>If $x$ is the solution to the equation above, what is the value of $x - 3$?",
            choices: ["$\\frac{23}{2}$", "$\\frac{17}{2}$", "$\\frac{15}{2}$", "$-\\frac{15}{2}$"],
            answerIdx: 1,
            explanation: "Choice B is correct. Factoring as $6(x - 3) - 11 = 4(x - 3) + 6$ leads to $2(x - 3) = 17$, so $x - 3 = \\frac{17}{2}$."
        },
        {
            id: "b7e6394d",
            q: "Alan drives 100 miles weekly at 25 mpg and gas costs $4/gal. Which equation finds the fewer average miles, $m$, he should drive to save $5?",
            choices: ["$\\frac{25}{4}m = 95$", "$\\frac{25}{4}m = 5$", "$\\frac{4}{25}m = 95$", "$\\frac{4}{25}m = 5$"],
            answerIdx: 3,
            explanation: "Choice D is correct. Cost per mile is $\\frac{4}{25}$. Multiplying by miles $m$ gives the expenditure reduction: $\\frac{4}{25}m = 5$."
        },
        {
            id: "e6cb2402",
            q: "$3(kx + 13) = \\frac{48}{17}x + 36$<br><br>If the equation has no solution, what is the value of $k$?",
            isGridIn: true,
            answerIdx: "16/17",
            explanation: "The correct answer is $16/17$. Dividing by 3 yields $kx + 13 = \\frac{16}{17}x + 12$. For no solution, $x$-coefficients must be equal: $k = \\frac{16}{17}$."
        }
    ];

    let currentQ = 0;
    let userSelections = new Array(6).fill(null);
    let markedStatus = new Array(6).fill(false);

    function renderMath(element) {
        if (window.renderMathInElement) {
            renderMathInElement(element, {
                delimiters: [{left: "$", right: "$", display: false}, {left: "$$", right: "$$", display: true}],
                throwOnError: false
            });
        }
    }

    function syncUI() {
        const data = questionBank[currentQ];
        document.getElementById('q-id-code').innerText = data.id;
        document.getElementById('progress-text').innerText = `Question ${currentQ + 1} of 6 ▾`;
        document.getElementById('question-text').innerHTML = data.q;
        
        const mark = document.getElementById('mark-trigger');
        markedStatus[currentQ] ? mark.classList.add('marked') : mark.classList.remove('marked');

        const list = document.getElementById('options-list');
        list.innerHTML = '';

        if (!data.isGridIn) {
            data.choices.forEach((text, i) => {
                const div = document.createElement('div');
                div.className = `option ${userSelections[currentQ] === i ? 'selected' : ''}`;
                div.innerHTML = `<div class="option-bubble">${String.fromCharCode(65+i)}</div><div class="txt">${text}</div>`;
                div.onclick = () => { userSelections[currentQ] = i; syncUI(); };
                list.appendChild(div);
            });
        } else {
            const input = document.createElement('input');
            input.style = "width: 100%; padding: 18px; font-size: 1.6rem; border: 2px solid #ccc; border-radius: 8px; font-family: var(--main-font);";
            input.placeholder = "Enter answer";
            input.value = userSelections[currentQ] || '';
            input.oninput = (e) => userSelections[currentQ] = e.target.value;
            list.appendChild(input);
        }
        renderMath(document.body);
    }

    function toggleMark() { markedStatus[currentQ] = !markedStatus[currentQ]; syncUI(); }

    function goNext() {
        if (currentQ < 5) { currentQ++; syncUI(); }
        else { finalizeTest(); }
    }

    function finalizeTest() {
        document.getElementById('quiz-view').classList.add('hidden');
        document.getElementById('bottom-bar').classList.add('hidden');
        document.getElementById('top-nav').style.background = "#f4f4f4";
        const container = document.getElementById('results-container');
        container.style.display = 'flex';

        let correctCount = 0;
        const feed = document.getElementById('feedback-feed');
        feed.innerHTML = '';

        questionBank.forEach((item, i) => {
            const isCorrect = item.isGridIn ? userSelections[i] === item.answerIdx : userSelections[i] === item.answerIdx;
            if (isCorrect) correctCount++;

            const div = document.createElement('div');
            div.className = 'feedback-item';
            div.innerHTML = `
                <div class="status-header ${isCorrect ? 'is-correct' : 'is-incorrect'}">${isCorrect ? '✓ Correct' : '✗ Incorrect'}</div>
                <div style="font-size: 1.4rem; margin-bottom: 15px;">${item.q}</div>
                <p><strong>Your Response:</strong> ${item.isGridIn ? (userSelections[i] || 'None') : (userSelections[i] !== null ? String.fromCharCode(65+userSelections[i]) : 'None')}</p>
                <p><strong>Correct Answer:</strong> ${item.isGridIn ? item.answerIdx : String.fromCharCode(65+item.answerIdx)}</p>
                <div class="rationale"><strong>Explanation:</strong> ${item.explanation}</div>
            `;
            feed.appendChild(div);
        });

        document.getElementById('final-score').innerText = correctCount;
        renderMath(feed);
    }

    function runTimer(totalSeconds) {
        setInterval(() => {
            let mins = Math.floor(totalSeconds / 60);
            let secs = totalSeconds % 60;
            document.getElementById('timer').innerText = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            if (--totalSeconds < 0) totalSeconds = 0;
        }, 1000);
    }

    window.onload = () => { syncUI(); runTimer(18 * 60); };
</script>

</body>
</html>
