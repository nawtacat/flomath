<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florian Math - Digital SAT Practice</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js" 
            onload="renderMath(document.body);"></script>

    <style>
        :root {
            --sat-blue: #0071bc;
            --sat-light-blue: #e8f3fb;
            --sat-dark: #1e1e1e;
            --sat-border: #d1d1d1;
            /* Minion Pro requested for font */
            --main-font: "Minion Pro", "Minion", "Georgia", "Times New Roman", serif;
            --ui-font: "Segoe UI", Roboto, Arial, sans-serif;
        }

        body {
            font-family: var(--main-font);
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* Top Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid var(--sat-border);
            height: 60px;
            font-family: var(--ui-font);
        }

        .timer-bubble {
            border: 1px solid var(--sat-border);
            border-radius: 20px;
            padding: 2px 25px;
            font-weight: 700;
            font-size: 1.2rem;
            background: white;
        }

        /* Main Split Layout */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 0 40px;
            gap: 40px;
        }

        .question-side {
            flex: 1;
            padding: 40px 0;
            overflow-y: auto;
            font-size: 1.25rem; /* Larger for Minion Pro readability */
            line-height: 1.6;
        }

        .options-side {
            flex: 1;
            padding: 40px 0;
            overflow-y: auto;
            font-family: var(--ui-font);
        }

        /* SAT Option Styling */
        .option-container {
            display: flex;
            align-items: center;
            border: 1px solid var(--sat-border);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .option-container:hover { background-color: #f8f8f8; }
        .option-container.selected {
            border: 2px solid var(--sat-blue);
            background-color: var(--sat-light-blue);
        }
        
        .option-container.eliminated {
            opacity: 0.3;
            text-decoration: line-through;
        }

        .option-letter {
            width: 32px; height: 32px;
            border: 1px solid #777;
            border-radius: 50%;
            display: flex;
            justify-content: center; align-items: center;
            margin-right: 15px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .selected .option-letter {
            background-color: var(--sat-blue);
            color: white;
            border-color: var(--sat-blue);
        }

        /* Mark for Review Ribbon */
        .mark-review-btn {
            display: flex;
            align-items: center;
            cursor: pointer;
            margin-bottom: 15px;
            font-family: var(--ui-font);
            font-weight: 600;
            font-size: 0.9rem;
        }

        .mark-icon { font-size: 1.4rem; margin-right: 8px; color: #ccc; }
        .marked .mark-icon { color: #cc0000; }

        /* Tools */
        .tools { display: flex; justify-content: flex-end; margin-bottom: 10px; }
        .tool-btn {
            border: 1px solid var(--sat-border);
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-family: var(--ui-font);
        }
        .tool-btn.active { background: #ffeb3b; }

        /* Footer Navigation */
        footer {
            height: 70px;
            border-top: 1px solid var(--sat-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            font-family: var(--ui-font);
        }

        .nav-dropdown {
            background: #222;
            color: white;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        .next-btn {
            background: var(--sat-blue);
            color: white;
            border: none;
            padding: 10px 35px;
            border-radius: 25px;
            font-weight: bold;
            cursor: pointer;
        }

        /* Review Grid Modal */
        #modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: white; padding: 30px; border-radius: 10px;
            width: 400px; text-align: center;
        }

        .grid {
            display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px;
            margin: 20px 0;
        }

        .grid-item {
            border: 1px dashed #aaa; height: 40px; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
        }

        .grid-item.answered { background: var(--sat-blue); color: white; border: none; }
        .grid-item.current { border: 2px solid black; }
        
        .grid-in {
            width: 100%; padding: 15px; font-size: 1.2rem;
            border: 2px solid var(--sat-border); border-radius: 5px;
        }
    </style>
</head>
<body>

<header>
    <div style="font-weight: bold;">Math Practice</div>
    <div class="timer-bubble" id="timer">35:00</div>
    <div style="width: 100px;"></div>
</header>

<main>
    <div class="question-side">
        <div class="mark-review-btn" id="mark-btn" onclick="toggleMark()">
            <span class="mark-icon">⚑</span> Mark for Review
        </div>
        <div id="q-content"></div>
    </div>
    <div class="options-side">
        <div class="tools">
            <div class="tool-btn" id="elim-btn" onclick="toggleEliminator()">ABC</div>
        </div>
        <div id="ans-container"></div>
    </div>
</main>

<footer>
    <div><a href="https://flomath.space" style="color: black; text-decoration: none; font-weight: bold;">flomath.space</a></div>
    <div class="nav-dropdown" onclick="toggleModal()">Question <span id="q-num-label">1</span> of 6 ▾</div>
    <button class="next-btn" onclick="nextQ()">Next</button>
</footer>

<div id="modal" onclick="toggleModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Question Navigation</h3>
        <div class="grid" id="nav-grid"></div>
        <button onclick="toggleModal()">Close</button>
    </div>
</div>

<script>
    const questions = [
        {
            text: "If $3x-8=7$, what is the value of $3x+8$?",
            type: "mcq",
            options: ["-1", "5", "13", "23"],
            correct: 3 //
        },
        {
            text: "$\\frac{4x}{5}=20$<br><br>In the equation above, what is the value of $x$?",
            type: "mcq",
            options: ["25", "24", "16", "15"],
            correct: 0 //
        },
        {
            text: "A company creates tape dispensers and calculates monthly profit by subtracting fixed costs from revenue. The equation $15,000=2.00x-4,500$ represents this situation.<br><br>Which statement is the best interpretation of $2.00$ in this context?",
            type: "mcq",
            options: [
                "The monthly sales revenue from selling tape dispensers",
                "The monthly sales revenue from each tape dispenser sold",
                "The monthly cost of creating each tape dispenser",
                "The monthly cost of creating tape dispensers"
            ],
            correct: 0 //
        },
        {
            text: "$3(2x-6)-11=4(x-3)+6$<br><br>If $x$ is the solution to the equation above, what is the value of $x-3$?",
            type: "mcq",
            options: ["$\\frac{23}{2}$", "$\\frac{17}{2}$", "$\\frac{15}{2}$", "$-\\frac{15}{2}$"],
            correct: 1 //
        },
        {
            text: "Alan drives 100 miles/week. Car gets 25 mpg. He wants to reduce gasoline spending by $5. Gasoline is $4/gal. Which equation determines fewer miles, $m$, he should drive?",
            type: "mcq",
            options: ["$\\frac{25}{4}m=95$", "$\\frac{25}{4}m=5$", "$\\frac{4}{25}m=95$", "$\\frac{4}{25}m=5$"],
            correct: 3 //
        },
        {
            text: "$3(kx+13)=\\frac{48}{17}x+36$<br><br>In the given equation, $k$ is a constant. The equation has no solution. What is the value of $k$?",
            type: "grid",
            correct: "16/17" //
        }
    ];

    let current = 0;
    let answers = new Array(6).fill(null);
    let marks = new Array(6).fill(false);
    let elimMode = false;

    function renderMath(el) {
        if (window.renderMathInElement) {
            renderMathInElement(el, {
                delimiters: [
                    {left: '$$', right: '$$', display: true},
                    {left: '$', right: '$', display: false}
                ]
            });
        }
    }

    function loadQ() {
        const q = questions[current];
        document.getElementById('q-num-label').innerText = current + 1;
        document.getElementById('q-content').innerHTML = q.text;
        
        const btn = document.getElementById('mark-btn');
        marks[current] ? btn.classList.add('marked') : btn.classList.remove('marked');

        const container = document.getElementById('ans-container');
        container.innerHTML = '';

        if (q.type === 'mcq') {
            document.getElementById('elim-btn').style.display = 'block';
            q.options.forEach((opt, i) => {
                const div = document.createElement('div');
                div.className = `option-container ${answers[current] === i ? 'selected' : ''}`;
                div.innerHTML = `<div class="option-letter">${String.fromCharCode(65+i)}</div><div>${opt}</div>`;
                div.onclick = () => select(i);
                container.appendChild(div);
            });
        } else {
            document.getElementById('elim-btn').style.display = 'none';
            const input = document.createElement('input');
            input.className = 'grid-in';
            input.placeholder = 'Enter answer';
            input.value = answers[current] || '';
            input.oninput = (e) => answers[current] = e.target.value;
            container.appendChild(input);
        }
        renderMath(document.body);
    }

    function select(i) {
        if (elimMode) {
            document.querySelectorAll('.option-container')[i].classList.toggle('eliminated');
        } else {
            answers[current] = i;
            loadQ();
        }
    }

    function toggleEliminator() {
        elimMode = !elimMode;
        document.getElementById('elim-btn').classList.toggle('active');
    }

    function toggleMark() {
        marks[current] = !marks[current];
        loadQ();
    }

    function nextQ() {
        if (current < 5) { current++; loadQ(); }
        else { alert("Quiz Complete! Return to flomath.space for your score."); }
    }

    function toggleModal() {
        const m = document.getElementById('modal');
        m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        const grid = document.getElementById('nav-grid');
        grid.innerHTML = '';
        questions.forEach((_, i) => {
            const item = document.createElement('div');
            item.className = `grid-item ${answers[i] !== null ? 'answered' : ''} ${current === i ? 'current' : ''}`;
            item.innerText = i + 1;
            item.onclick = () => { current = i; loadQ(); toggleModal(); };
            grid.appendChild(item);
        });
    }

    function startTimer(duration) {
        let t = duration;
        setInterval(() => {
            let m = Math.floor(t / 60), s = t % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (--t < 0) t = 0;
        }, 1000);
    }

    window.onload = () => { loadQ(); startTimer(35*60); };
</script>

</body>
</html>
