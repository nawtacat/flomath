<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florian Math - SAT Practice</title>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --sat-blue: #0071bc;
            --sat-light-blue: #e8f3fb;
            --sat-dark: #1e1e1e;
            --sat-border: #d1d1d1;
            --sat-font: "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            font-family: var(--sat-font);
            margin: 0;
            padding: 0;
            background-color: #fff;
            color: #333;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Top Header */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 20px;
            border-bottom: 1px solid var(--sat-border);
            height: 60px;
        }

        .module-title { font-weight: 700; font-size: 1.1rem; }
        
        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timer-bubble {
            border: 1px solid var(--sat-border);
            border-radius: 20px;
            padding: 2px 25px;
            font-weight: 700;
            font-size: 1.2rem;
            background: white;
        }

        .hide-btn {
            font-size: 0.75rem;
            color: #666;
            cursor: pointer;
            text-decoration: underline;
            margin-top: 2px;
        }

        /* Main Content Split Area */
        main {
            display: flex;
            flex: 1;
            overflow: hidden;
            padding: 0 40px;
            gap: 40px;
        }

        .question-side {
            flex: 1;
            padding: 40px 0;
            overflow-y: auto;
            font-size: 1.15rem;
            line-height: 1.6;
        }

        .options-side {
            flex: 1;
            padding: 40px 0;
            overflow-y: auto;
            position: relative;
        }

        /* SAT Option Styling */
        .option-container {
            display: flex;
            align-items: center;
            border: 1px solid var(--sat-border);
            border-radius: 10px;
            padding: 18px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: background 0.2s;
            position: relative;
        }

        .option-container:hover { background-color: #f5f5f5; }
        .option-container.selected {
            border: 2px solid var(--sat-blue);
            background-color: var(--sat-light-blue);
        }

        .option-container.eliminated {
            opacity: 0.4;
            pointer-events: none;
        }

        .option-letter {
            width: 34px;
            height: 34px;
            border: 1px solid #777;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 15px;
            font-weight: bold;
            flex-shrink: 0;
        }

        .selected .option-letter {
            background-color: var(--sat-blue);
            color: white;
            border-color: var(--sat-blue);
        }

        /* Mark for Review */
        .mark-for-review {
            display: flex;
            align-items: center;
            font-size: 0.9rem;
            color: #444;
            cursor: pointer;
            margin-bottom: 20px;
            background: #f9f9f9;
            padding: 5px 10px;
            border-radius: 4px;
            width: fit-content;
        }

        .mark-icon {
            color: #d1d1d1;
            margin-right: 8px;
            font-size: 1.2rem;
        }

        .marked .mark-icon { color: #cc0000; }

        /* Tools */
        .tools-bar {
            display: flex;
            justify-content: flex-end;
            gap: 15px;
            margin-bottom: 10px;
        }

        .tool-icon {
            width: 35px;
            height: 35px;
            border: 1px solid var(--sat-border);
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: bold;
        }
        
        .tool-icon.active { background-color: #ffeb3b; border-color: #fbc02d; }

        /* Footer */
        footer {
            height: 70px;
            border-top: 1px solid var(--sat-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .footer-left a {
            text-decoration: none;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .nav-center {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }

        .q-dropdown {
            background: #222;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            font-weight: 600;
        }

        .next-btn {
            background-color: var(--sat-blue);
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }

        /* Review Modal */
        #review-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 500px;
            max-width: 90%;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin-top: 20px;
        }

        .grid-box {
            border: 2px dashed var(--sat-border);
            height: 45px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }

        .grid-box.answered { border-style: solid; background: var(--sat-blue); color: white; }
        .grid-box.current { border: 2px solid #000; }

        /* Grid-in Input Style */
        .grid-input {
            width: 200px;
            padding: 12px;
            font-size: 1.2rem;
            border: 2px solid var(--sat-border);
            border-radius: 5px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<header>
    <div class="module-title">Math Module 1</div>
    <div class="timer-container">
        <div class="timer-bubble" id="timer">35:00</div>
        <div class="hide-btn">Hide</div>
    </div>
    <div style="width: 100px;"></div> </header>

<main>
    <div class="question-side">
        <div class="mark-for-review" onclick="toggleMark()">
            <span class="mark-icon" id="mark-ribbon">⚑</span> 
            Mark for Review
        </div>
        <div id="question-text">
            </div>
    </div>

    <div class="options-side">
        <div class="tools-bar">
            <div class="tool-icon" id="elim-tool" onclick="toggleEliminator()" title="Eliminate Answers">ABC</div>
        </div>
        <div id="options-container">
            </div>
    </div>
</main>

<footer>
    <div class="footer-left">
        <a href="https://flomath.space">Florian Math</a>
    </div>

    <div class="nav-center">
        <div class="q-dropdown" onclick="toggleReviewModal()">
            <span id="current-q-label">Question 1 of 6</span>
            <span>^</span>
        </div>
    </div>

    <div class="footer-right">
        <button class="next-btn" onclick="nextQuestion()">Next</button>
    </div>
</footer>

<div id="review-modal">
    <div class="modal-content">
        <h3>Math Module 1</h3>
        <p>Select a question to jump to it.</p>
        <div class="grid-container" id="grid-container"></div>
        <button onclick="toggleReviewModal()" style="margin-top:20px; width:100%; padding:10px; background: #eee; border:none; cursor:pointer;">Close</button>
    </div>
</div>

<script>
    const questions = [
        {
            id: "9b886541",
            text: "If $3x-8=7$, what is the value of $3x+8$?",
            type: "mcq",
            options: ["-1", "5", "13", "23"],
            correct: 3 // D
        },
        {
            id: "6ac23de7",
            text: "$\\frac{4x}{5}=20$<br><br>In the equation above, what is the value of $x$?",
            type: "mcq",
            options: ["25", "24", "16", "15"],
            correct: 0 // A
        },
        {
            id: "9d4270fe",
            text: "A company that creates and sells tape dispensers calculates its monthly profit, in dollars, by subtracting its fixed monthly costs from its monthly sales revenue. The equation $15,000=2.00x-4,500$ represents this situation.<br><br>Which statement is the best interpretation of 2.00 in this context?",
            type: "mcq",
            options: [
                "The monthly sales revenue, in dollars, from selling tape dispensers",
                "The monthly sales revenue, in dollars, from each tape dispenser sold",
                "The monthly cost, in dollars, of creating each tape dispenser",
                "The monthly cost, in dollars, of creating tape dispensers"
            ],
            correct: 0 // A [cite: 58-61]
        },
        {
            id: "7a5a74a6",
            text: "$3(2x-6)-11=4(x-3)+6$<br><br>If $x$ is the solution to the equation above, what is the value of $x-3$?",
            type: "mcq",
            options: ["$\\frac{23}{2}$", "$\\frac{17}{2}$", "$\\frac{15}{2}$", "$-\\frac{15}{2}$"],
            correct: 1 // B [cite: 86]
        },
        {
            id: "b7e6394d",
            text: "Alan drives an average of 100 miles each week. His car travels 25 miles per gallon. Alan wants to reduce his weekly expenditure on gasoline by $5. Gasoline costs $4 per gallon. Which equation determines how many fewer miles, $m$, he should drive?",
            type: "mcq",
            options: ["$\\frac{25}{4}m=95$", "$\\frac{25}{4}m=5$", "$\\frac{4}{25}m=95$", "$\\frac{4}{25}m=5$"],
            correct: 3 // D [cite: 124]
        },
        {
            id: "e6cb2402",
            text: "$3(kx+13)=\\frac{48}{17}x+36$<br><br>In the given equation, $k$ is a constant. The equation has no solution. What is the value of $k$?",
            type: "grid",
            correct: "16/17" // [cite: 155]
        }
    ];

    let currentIdx = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let markedQuestions = new Array(questions.length).fill(false);
    let eliminatorActive = false;

    function init() {
        renderQuestion();
        renderGrid();
        startTimer(35 * 60);
    }

    function renderQuestion() {
        const q = questions[currentIdx];
        document.getElementById('current-q-label').innerText = `Question ${currentIdx + 1} of ${questions.length}`;
        document.getElementById('question-text').innerHTML = q.text;
        
        // Ribbon state
        const ribbon = document.querySelector('.mark-for-review');
        markedQuestions[currentIdx] ? ribbon.classList.add('marked') : ribbon.classList.remove('marked');

        const container = document.getElementById('options-container');
        container.innerHTML = '';

        if (q.type === 'mcq') {
            q.options.forEach((opt, i) => {
                const char = String.fromCharCode(65 + i);
                const div = document.createElement('div');
                div.className = `option-container ${userAnswers[currentIdx] === i ? 'selected' : ''}`;
                div.innerHTML = `<div class="option-letter">${char}</div> <div>${opt}</div>`;
                div.onclick = () => selectOption(i);
                container.appendChild(div);
            });
        } else {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'grid-input';
            input.placeholder = 'Enter value';
            input.value = userAnswers[currentIdx] || '';
            input.oninput = (e) => userAnswers[currentIdx] = e.target.value;
            container.appendChild(input);
        }

        if (window.MathJax) MathJax.typesetPromise();
    }

    function selectOption(idx) {
        if (eliminatorActive) {
            const options = document.querySelectorAll('.option-container');
            options[idx].classList.toggle('eliminated');
        } else {
            userAnswers[currentIdx] = idx;
            renderQuestion();
        }
    }

    function toggleEliminator() {
        eliminatorActive = !eliminatorActive;
        document.getElementById('elim-tool').classList.toggle('active');
    }

    function toggleMark() {
        markedQuestions[currentIdx] = !markedQuestions[currentIdx];
        renderQuestion();
    }

    function nextQuestion() {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            renderQuestion();
        } else {
            alert("End of Module! Check your flomath.space for results.");
        }
    }

    function toggleReviewModal() {
        const modal = document.getElementById('review-modal');
        modal.style.display = modal.style.display === 'flex' ? 'none' : 'flex';
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('grid-container');
        grid.innerHTML = '';
        questions.forEach((_, i) => {
            const box = document.createElement('div');
            box.className = `grid-box ${userAnswers[i] !== null ? 'answered' : ''} ${currentIdx === i ? 'current' : ''}`;
            box.innerText = i + 1;
            box.onclick = () => {
                currentIdx = i;
                renderQuestion();
                toggleReviewModal();
            };
            grid.appendChild(box);
        });
    }

    function startTimer(seconds) {
        const timerDisplay = document.getElementById('timer');
        setInterval(() => {
            let m = Math.floor(seconds / 60);
            let s = seconds % 60;
            timerDisplay.innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            if (seconds > 0) seconds--;
        }, 1000);
    }

    window.onload = init;
</script>
</body>
</html>
