<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pro Ripple Trimmer (MP3 Edition)</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lamejs/1.2.1/lame.all.min.js"></script>
    <style>
        :root { --bg: #0f0f12; --surface: #1a1a1f; --primary: #7c4dff; --accent: #00e5ff; --text: #f0f0f0; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: var(--surface); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #333; }
        .controls { display: flex; gap: 12px; align-items: center; }
        button { background: #2a2a32; border: 1px solid #444; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; transition: 0.2s; }
        button:hover { border-color: var(--primary); background: #333; }
        button:active { transform: translateY(1px); }
        #exportBtn { background: var(--primary); border: none; font-weight: 600; }
        #editor-container { flex-grow: 1; overflow-x: auto; overflow-y: hidden; background: #050505; position: relative; cursor: crosshair; }
        canvas { display: block; height: 100%; }
        #playhead { position: absolute; top: 0; left: 0; width: 2px; height: 100%; background: var(--accent); box-shadow: 0 0 8px var(--accent); pointer-events: none; }
        .kbd-hint { font-size: 12px; color: #888; }
        kbd { background: #333; padding: 2px 4px; border-radius: 3px; color: var(--accent); }
        #status { position: fixed; bottom: 20px; right: 20px; background: var(--primary); padding: 10px 20px; border-radius: 8px; display: none; z-index: 100; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

<header>
    <div class="controls">
        <button onclick="document.getElementById('audioInput').click()">📁 Open File</button>
        <input type="file" id="audioInput" hidden accept="audio/*">
        <button id="playBtn" disabled>Play (Space)</button>
        <button id="zoomIn">Zoom In (+)</button>
        <button id="zoomOut">Zoom Out (-)</button>
    </div>
    <div class="kbd-hint">
        <kbd>S</kbd> Cut | <kbd>Del</kbd> Ripple Delete | Click to Seek
    </div>
    <button id="exportBtn" disabled>Save as MP3</button>
</header>

<div id="editor-container">
    <canvas id="waveform-canvas"></canvas>
    <div id="playhead"></div>
</div>

<div id="status">Processing...</div>

<script>
    let audioCtx = null;
    let mainBuffer = null;
    let segments = []; 
    let selectedSegmentIndex = -1;
    let zoom = 60; 
    let currentTime = 0;
    let isPlaying = false;
    let startTime = 0;
    let sourceNode = null;

    const canvas = document.getElementById('waveform-canvas');
    const ctx = canvas.getContext('2d');
    const container = document.getElementById('editor-container');
    const playhead = document.getElementById('playhead');
    const statusBox = document.getElementById('status');

    function showStatus(text) { statusBox.innerText = text; statusBox.style.display = 'block'; }
    function hideStatus() { statusBox.style.display = 'none'; }

    // --- File Loading ---
    document.getElementById('audioInput').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        showStatus("Decoding Audio...");
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        try {
            const arrayBuffer = await file.arrayBuffer();
            // Robust decoding
            mainBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            segments = [{ start: 0, end: mainBuffer.duration }];
            selectedSegmentIndex = 0;
            currentTime = 0;
            
            document.getElementById('playBtn').disabled = false;
            document.getElementById('exportBtn').disabled = false;
            hideStatus();
            render();
        } catch (err) {
            alert("Error: Could not decode audio. Try a different format or ensure the file isn't corrupted.");
            console.error(err);
            hideStatus();
        }
    });

    // --- Rendering ---
    function render() {
        if (!mainBuffer) return;
        const totalDuration = segments.reduce((acc, s) => acc + (s.end - s.start), 0);
        canvas.width = totalDuration * zoom;
        canvas.height = container.clientHeight;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const data = mainBuffer.getChannelData(0);
        let currentX = 0;

        segments.forEach((seg, idx) => {
            const segWidth = (seg.end - seg.start) * zoom;
            ctx.fillStyle = (idx === selectedSegmentIndex) ? '#251a4a' : '#0a0a0a';
            ctx.fillRect(currentX, 0, segWidth, canvas.height);

            ctx.beginPath();
            ctx.strokeStyle = (idx === selectedSegmentIndex) ? '#bb86fc' : '#03dac6';
            ctx.lineWidth = 1;

            const startIdx = Math.floor(seg.start * mainBuffer.sampleRate);
            const endIdx = Math.floor(seg.end * mainBuffer.sampleRate);
            const step = Math.floor((endIdx - startIdx) / segWidth);

            for (let i = 0; i < segWidth; i++) {
                let min = 1.0, max = -1.0;
                for (let j = 0; j < step; j++) {
                    const v = data[startIdx + (i * step) + j];
                    if (v < min) min = v; if (v > max) max = v;
                }
                ctx.moveTo(currentX + i, (1 + min) * canvas.height / 2);
                ctx.lineTo(currentX + i, (1 + max) * canvas.height / 2);
            }
            ctx.stroke();
            
            seg.xStart = currentX;
            seg.xEnd = currentX + segWidth;
            currentX += segWidth;
        });
        updatePlayhead();
    }

    function updatePlayhead() { playhead.style.left = (currentTime * zoom) + 'px'; }

    // --- Logic ---
    container.onclick = (e) => {
        const x = e.clientX - canvas.getBoundingClientRect().left + container.scrollLeft;
        currentTime = x / zoom;
        selectedSegmentIndex = segments.findIndex(s => x >= s.xStart && x <= s.xEnd);
        if (isPlaying) stopPlayback();
        render();
    };

    window.onkeydown = (e) => {
        if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
        if (e.key.toLowerCase() === 's') makeCut();
        if (e.code === 'Delete' || e.code === 'Backspace') rippleDelete();
    };

    function makeCut() {
        if (!mainBuffer || selectedSegmentIndex === -1) return;
        const seg = segments[selectedSegmentIndex];
        const offsetInSeg = currentTime - (seg.xStart / zoom);
        const splitPoint = seg.start + offsetInSeg;

        if (splitPoint > seg.start && splitPoint < seg.end) {
            segments.splice(selectedSegmentIndex, 1, 
                { start: seg.start, end: splitPoint },
                { start: splitPoint, end: seg.end }
            );
            render();
        }
    }

    function rippleDelete() {
        if (segments.length <= 1 || selectedSegmentIndex === -1) return;
        segments.splice(selectedSegmentIndex, 1);
        selectedSegmentIndex = Math.max(0, selectedSegmentIndex - 1);
        render();
    }

    // --- Playback ---
    function togglePlay() {
        if (isPlaying) stopPlayback();
        else startPlayback(currentTime);
    }

    function startPlayback(time) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const exportBuf = createCombinedBuffer();
        sourceNode = audioCtx.createBufferSource();
        sourceNode.buffer = exportBuf;
        sourceNode.connect(audioCtx.destination);
        startTime = audioCtx.currentTime - time;
        sourceNode.start(0, time);
        isPlaying = true;
        requestAnimationFrame(syncPlayhead);
    }

    function stopPlayback() {
        if (sourceNode) sourceNode.stop();
        isPlaying = false;
    }

    function syncPlayhead() {
        if (!isPlaying) return;
        currentTime = audioCtx.currentTime - startTime;
        updatePlayhead();
        requestAnimationFrame(syncPlayhead);
    }

    function createCombinedBuffer() {
        const totalSamples = segments.reduce((acc, s) => acc + Math.floor((s.end - s.start) * mainBuffer.sampleRate), 0);
        const out = audioCtx.createBuffer(mainBuffer.numberOfChannels, totalSamples, mainBuffer.sampleRate);
        for (let ch = 0; ch < mainBuffer.numberOfChannels; ch++) {
            const data = mainBuffer.getChannelData(ch);
            const outData = out.getChannelData(ch);
            let offset = 0;
            segments.forEach(s => {
                const slice = data.slice(s.start * mainBuffer.sampleRate, s.end * mainBuffer.sampleRate);
                outData.set(slice, offset);
                offset += slice.length;
            });
        }
        return out;
    }

    // --- MP3 Export ---
    document.getElementById('exportBtn').onclick = async () => {
        showStatus("Encoding MP3 (192kbps)...");
        const buffer = createCombinedBuffer();
        
        // Use a Worker or timeout to prevent UI freeze
        setTimeout(() => {
            const mp3Blob = encodeMP3(buffer);
            const url = URL.createObjectURL(mp3Blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "edited_audio.mp3";
            a.click();
            hideStatus();
        }, 100);
    };

    function encodeMP3(audioBuffer) {
        const channels = audioBuffer.numberOfChannels;
        const sampleRate = audioBuffer.sampleRate;
        const mp3encoder = new lamejs.Mp3Encoder(channels, sampleRate, 192);
        const mp3Data = [];

        const left = audioBuffer.getChannelData(0);
        const right = channels > 1 ? audioBuffer.getChannelData(1) : left;

        // Convert Float32 to Int16
        const convert = (f32) => {
            let s = Math.max(-1, Math.min(1, f32));
            return s < 0 ? s * 0x8000 : s * 0x7FFF;
        };

        const sampleBlockSize = 1152;
        for (let i = 0; i < left.length; i += sampleBlockSize) {
            const leftChunk = new Int16Array(sampleBlockSize);
            const rightChunk = new Int16Array(sampleBlockSize);
            for (let j = 0; j < sampleBlockSize; j++) {
                leftChunk[j] = convert(left[i + j]);
                rightChunk[j] = convert(right[i + j]);
            }
            const mp3buf = mp3encoder.encodeBuffer(leftChunk, rightChunk);
            if (mp3buf.length > 0) mp3Data.push(mp3buf);
        }

        const end = mp3encoder.flush();
        if (end.length > 0) mp3Data.push(end);
        return new Blob(mp3Data, { type: 'audio/mp3' });
    }

    document.getElementById('zoomIn').onclick = () => { zoom *= 1.4; render(); };
    document.getElementById('zoomOut').onclick = () => { zoom /= 1.4; render(); };
    document.getElementById('playBtn').onclick = togglePlay;
</script>
</body>
</html>
