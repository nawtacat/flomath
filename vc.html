<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoiceClone AI | Instant Voice Synthesis</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-6">

    <header class="w-full max-w-4xl flex justify-between items-center mb-12 py-6">
        <h1 class="text-2xl font-bold gradient-text flex items-center gap-2">
            <i data-lucide="mic"></i> VoiceClone AI
        </h1>
        <div class="flex items-center gap-4">
            <input type="password" id="apiKey" placeholder="Enter ElevenLabs API Key" 
                   class="glass px-4 py-2 rounded-lg text-sm outline-none focus:ring-2 focus:ring-sky-500 w-64">
        </div>
    </header>

    <main class="w-full max-w-4xl grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <section class="glass p-8 rounded-3xl space-y-6">
            <div class="flex items-center gap-3">
                <span class="bg-sky-500/20 text-sky-400 w-8 h-8 rounded-full flex items-center justify-center font-bold">1</span>
                <h2 class="text-xl font-semibold">Clone Your Voice</h2>
            </div>
            <p class="text-slate-400 text-sm">Upload a clear 1-minute audio sample (MP3/WAV) of yourself speaking.</p>
            
            <div id="dropZone" class="border-2 border-dashed border-slate-700 rounded-2xl p-8 text-center hover:border-sky-500 transition-colors cursor-pointer">
                <i data-lucide="upload-cloud" class="mx-auto mb-4 text-slate-500"></i>
                <p class="text-sm text-slate-300">Click to upload or drag & drop</p>
                <input type="file" id="audioInput" class="hidden" accept="audio/*">
            </div>

            <button id="cloneBtn" class="w-full bg-sky-600 hover:bg-sky-500 text-white font-semibold py-3 rounded-xl transition-all flex items-center justify-center gap-2 disabled:opacity-50">
                <i data-lucide="fingerprint"></i> Create Voice Identity
            </button>
            <p id="cloneStatus" class="text-xs text-center text-slate-500 italic"></p>
        </section>

        <section class="glass p-8 rounded-3xl space-y-6">
            <div class="flex items-center gap-3">
                <span class="bg-indigo-500/20 text-indigo-400 w-8 h-8 rounded-full flex items-center justify-center font-bold">2</span>
                <h2 class="text-xl font-semibold">Generate Speech</h2>
            </div>
            
            <textarea id="textPrompt" rows="4" placeholder="What should your voice say?" 
                      class="w-full glass p-4 rounded-xl text-sm outline-none focus:ring-2 focus:ring-indigo-500 resize-none"></textarea>

            <button id="generateBtn" disabled class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-semibold py-3 rounded-xl transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                <i data-lucide="play"></i> Generate Audio
            </button>

            <div id="playerContainer" class="hidden space-y-4 pt-4 border-t border-slate-700">
                <p class="text-xs uppercase tracking-widest text-slate-500 font-bold">Result</p>
                <audio id="audioPlayer" controls class="w-full"></audio>
            </div>
        </section>

    </main>

    <footer class="mt-auto py-8 text-slate-500 text-xs">
        &copy; 2026 VoiceClone AI • Powered by Neural TTS
    </footer>

    <script>
        // Initialize Icons
        lucide.createIcons();

        const audioInput = document.getElementById('audioInput');
        const dropZone = document.getElementById('dropZone');
        const cloneBtn = document.getElementById('cloneBtn');
        const generateBtn = document.getElementById('generateBtn');
        const textPrompt = document.getElementById('textPrompt');
        const audioPlayer = document.getElementById('audioPlayer');
        const playerContainer = document.getElementById('playerContainer');
        const cloneStatus = document.getElementById('cloneStatus');

        let voiceId = null;

        // File Selection
        dropZone.onclick = () => audioInput.click();
        audioInput.onchange = (e) => {
            if(e.target.files.length) {
                dropZone.querySelector('p').innerText = e.target.files[0].name;
                dropZone.classList.add('border-sky-500');
            }
        };

        // STEP 1: CLONE VOICE
        cloneBtn.onclick = async () => {
            const apiKey = document.getElementById('apiKey').value;
            const file = audioInput.files[0];

            if (!apiKey || !file) {
                alert("Please provide an API Key and an Audio File!");
                return;
            }

            cloneBtn.disabled = true;
            cloneStatus.innerText = "Processing voice fingerprint...";

            const formData = new FormData();
            formData.append('files', file);
            formData.append('name', 'My Clone ' + Date.now());

            try {
                const response = await fetch('https://api.elevenlabs.io/v1/voices/add', {
                    method: 'POST',
                    headers: { 'xi-api-key': apiKey },
                    body: formData
                });

                const data = await response.json();
                if (data.voice_id) {
                    voiceId = data.voice_id;
                    cloneStatus.innerText = "Voice cloned successfully!";
                    generateBtn.disabled = false;
                } else {
                    throw new Error(data.detail?.message || "Cloning failed");
                }
            } catch (err) {
                alert(err.message);
                cloneBtn.disabled = false;
                cloneStatus.innerText = "";
            }
        };

        // STEP 2: GENERATE SPEECH
        generateBtn.onclick = async () => {
            const apiKey = document.getElementById('apiKey').value;
            const text = textPrompt.value;

            if (!text) return alert("Enter some text first!");

            generateBtn.disabled = true;
            generateBtn.innerText = "Synthesizing...";

            try {
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, {
                    method: 'POST',
                    headers: {
                        'xi-api-key': apiKey,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        text: text,
                        model_id: "eleven_multilingual_v2",
                        voice_settings: { stability: 0.5, similarity_boost: 0.75 }
                    })
                });

                const blob = await response.blob();
                const url = URL.createObjectURL(blob);
                audioPlayer.src = url;
                playerContainer.classList.remove('hidden');
                audioPlayer.play();
            } catch (err) {
                alert("Error generating speech: " + err.message);
            } finally {
                generateBtn.disabled = false;
                generateBtn.innerHTML = '<i data-lucide="play"></i> Generate Audio';
                lucide.createIcons();
            }
        };
    </script>
</body>
</html>
